<title>NÜRHAUS — The Collection Arrives</title>
<style>
  :root {
    --bone:     #F8F5F1;
    --bone-2:   #F1EBE3;
    --ink:      #111111;
    --accent:   #8E7D6A;
    --gold:     #C7A76C;
    --hairline: #E4DDD6;
    --smoke:    #7A746F;

    --ground:   var(--bone);
    --panel:    var(--bone-2);
    --fg:       var(--ink);
    --fg-soft:  var(--smoke);
    --line:     var(--hairline);
    --arch:     rgba(142,125,106,0.55);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ground:  #1C1712;
      --panel:   #221C16;
      --fg:      #F1EBE3;
      --fg-soft: #A79D92;
      --line:    #38302A;
      --arch:    rgba(199,167,108,0.42);
    }
  }
  :root[data-theme="light"] {
    --ground: var(--bone); --panel: var(--bone-2); --fg: var(--ink);
    --fg-soft: var(--smoke); --line: var(--hairline); --arch: rgba(142,125,106,0.55);
  }
  :root[data-theme="dark"] {
    --ground:#1C1712; --panel:#221C16; --fg:#F1EBE3; --fg-soft:#A79D92;
    --line:#38302A; --arch:rgba(199,167,108,0.42);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--ground);
    color: var(--fg);
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1.5rem, 5vw, 4rem);
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    width: 100%;
    max-width: 640px;
    text-align: center;
    position: relative;
  }

  /* Mihrab arch frame */
  .arch {
    position: relative;
    padding: clamp(3rem, 9vw, 5.5rem) clamp(1.5rem, 6vw, 3.5rem) clamp(2.5rem, 7vw, 4rem);
  }
  .arch::before {
    content: "";
    position: absolute;
    inset: 0;
    border: 1px solid var(--arch);
    border-bottom: none;
    border-radius: 50% 50% 0 0 / 32% 32% 0 0;
    -webkit-mask: linear-gradient(#000, #000);
    pointer-events: none;
  }
  .arch::after {
    content: "";
    position: absolute;
    left: 50%;
    top: -1px;
    width: 5px; height: 5px;
    background: var(--gold);
    border-radius: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
  }

  .eyebrow {
    font-family: system-ui, sans-serif;
    font-size: 0.66rem;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--fg-soft);
    margin: 0 0 1.4rem;
    padding-left: 0.34em;
  }

  .arabic {
    font-family: 'Amiri', 'Scheherazade New', Georgia, serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    color: var(--accent);
    margin: 0 0 0.6rem;
    direction: rtl;
    opacity: 0.9;
  }
  :root[data-theme="dark"] .arabic,
  @media (prefers-color-scheme: dark) { }

  h1 {
    font-weight: 400;
    font-size: clamp(2.1rem, 8vw, 3.4rem);
    line-height: 1.06;
    letter-spacing: 0.01em;
    text-wrap: balance;
    margin: 0 0 1.5rem;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .rule {
    width: 34px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 2.4rem;
  }

  .clock {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin: 0 auto 2.6rem;
    max-width: 460px;
  }
  .cell {
    position: relative;
    padding: 0.5rem 0.25rem;
  }
  .cell + .cell::before {
    content: "";
    position: absolute;
    left: 0; top: 18%;
    width: 1px; height: 64%;
    background: var(--line);
  }
  .num {
    font-size: clamp(2.4rem, 11vw, 3.9rem);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
    display: block;
  }
  .lab {
    font-family: system-ui, sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--fg-soft);
    margin-top: 0.85rem;
    padding-left: 0.28em;
  }

  .when {
    font-family: system-ui, sans-serif;
    font-size: 0.74rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-soft);
  }

  .arrived {
    display: none;
    font-size: clamp(1rem, 4vw, 1.25rem);
    color: var(--accent);
    font-style: italic;
    margin-top: 0.5rem;
  }

  .stage { animation: rise 1.1s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }
  .tick { animation: pulse 1s ease-out; }
  @keyframes pulse { from { opacity: 0.45; } to { opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    .stage, .tick { animation: none; }
  }
</style>

<main class="stage">
  <div class="arch">
    <p class="eyebrow">NÜRHAUS · The Collection</p>
    <p class="arabic" dir="rtl">نورهاوس</p>
    <h1>The collection <em>arrives</em></h1>
    <div class="rule"></div>

    <div class="clock" id="clock" role="timer" aria-live="polite" aria-label="Time remaining until launch">
      <div class="cell"><span class="num" id="d">00</span><span class="lab">Days</span></div>
      <div class="cell"><span class="num" id="h">00</span><span class="lab">Hours</span></div>
      <div class="cell"><span class="num" id="m">00</span><span class="lab">Minutes</span></div>
      <div class="cell"><span class="num" id="s">00</span><span class="lab">Seconds</span></div>
    </div>

    <p class="when">July 17, 2026 · 12:00 PM ET</p>
    <p class="arrived" id="arrived">The wait is over.</p>
  </div>
</main>

<script>
  // Noon Eastern on launch day. July is EDT (UTC−4).
  var target = new Date('2026-07-17T12:00:00-04:00').getTime();

  var d = document.getElementById('d'),
      h = document.getElementById('h'),
      m = document.getElementById('m'),
      s = document.getElementById('s'),
      clock = document.getElementById('clock'),
      arrived = document.getElementById('arrived');

  var last = -1;
  function pad(n){ return (n < 10 ? '0' : '') + n; }

  function frame() {
    var diff = target - Date.now();
    if (diff <= 0) {
      clock.style.display = 'none';
      arrived.style.display = 'block';
      return;
    }
    var sec = Math.floor(diff / 1000);
    var days = Math.floor(sec / 86400);
    var hrs  = Math.floor((sec % 86400) / 3600);
    var mins = Math.floor((sec % 3600) / 60);
    var secs = sec % 60;

    d.textContent = pad(days);
    h.textContent = pad(hrs);
    m.textContent = pad(mins);
    if (secs !== last) {
      s.textContent = pad(secs);
      s.classList.remove('tick'); void s.offsetWidth; s.classList.add('tick');
      last = secs;
    }
    requestAnimationFrame(frame);
  }
  frame();
</script>
